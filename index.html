<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8">

<title>Kindle Dashboard</title>

<style>
body{
    background:#ffffff;
    color:#000000;
    margin:0;
    padding:0;
    font-family:Georgia, serif;
    text-align:center;
}

.wrapper{
    width:100%;
    margin-top:60px;
}

.day{
    font-size:110px;
    font-weight:bold;
    line-height:1;
}

.month{
    font-size:28px;
    letter-spacing:5px;
    margin-bottom:40px;
}

.weather{
    font-size:26px;
    line-height:1.6;
}

.line{
    width:70%;
    margin:40px auto;
    border-top:1px solid #000;
}

.quote{
    width:80%;
    margin:auto;
    font-size:24px;
    line-height:1.6;
}

.time{
    font-size:30px;
}
</style>

</head>

<body>

<div class="wrapper">

<div class="day">
15
</div>

<div class="month">
JUNE
</div>

<div class="weather">
☁ Nublado<br>
18°C
</div>

<div class="line"></div>

<div class="quote">
Você não precisa estar motivado.<br><br>
Você precisa aparecer.
</div>

<div class="line"></div>

<div class="time">
23:00
</div>

</div>

</body>
</html>
