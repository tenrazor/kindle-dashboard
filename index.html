<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kindle Dashboard</title>

<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    color:#000000;
    font-family:Georgia, serif;
    text-align:center;
}

.container{
    width:100%;
    margin-top:40px;
}

.day{
    font-size:130px;
    font-weight:bold;
    line-height:1;
}

.month{
    font-size:28px;
    letter-spacing:8px;
    margin-bottom:40px;
}

.weather{
    font-size:28px;
    line-height:1.6;
}

.separator{
    width:70%;
    margin:35px auto;
    border-top:1px solid #000;
}

.quote{
    width:80%;
    margin:auto;
    font-size:24px;
    line-height:1.7;
}

.time{
    font-size:42px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

```
<div class="day">
    15
</div>

<div class="month">
    JUNE
</div>

<div class="weather">
    ☁ Nublado<br>
    18°C
</div>

<div class="separator"></div>

<div class="quote">
    Você não precisa estar motivado.<br><br>
    Você precisa aparecer.
</div>

<div class="separator"></div>

<div class="time">
    23:00
</div>
```

</div>

</body>
</html>
