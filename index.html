<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle Dashboard</title>
    <style>
        body {
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            text-align: center;
        }

        .wrapper {
            width: 100%;
            margin-top: 60px;
        }

        .day {
            font-size: 140px;
            font-weight: bold;
            line-height: 1;
        }

        .month {
            font-size: 32px;
            letter-spacing: 10px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .weather {
            font-size: 28px;
            line-height: 1.6;
        }

        .line {
            width: 60%;
            margin: 40px auto;
            border-top: 2px solid #ffffff;
        }

        .quote {
            width: 85%;
            margin: auto;
            font-size: 26px;
            line-height: 1.6;
            font-style: italic;
        }

        .time {
            font-size: 50px;
            margin-top: 50px;
            font-weight: bold;
        }
    </style>
    <meta http-equiv="refresh" content="60">
</head>
<body>

    <div class="wrapper">
        <div class="day">14</div>
        <div class="month">JUNE</div>
        
        <div class="weather">
            ☁ Nublado<br>
            18°C
        </div>

        <div class="line"></div>

        <div class="quote">
            "Você não precisa estar motivado.<br>
            Você precisa aparecer."
        </div>

        <div class="line"></div>

        <div class="time">
           <script>
        // Cria uma data com o timezone de Brasília (GMT-3)
        var d = new Date();
        var utc = d.getTime() + (d.getTimezoneOffset() * 60000);
        var nd = new Date(utc + (3600000 * -3));
        var hours = nd.getHours();
        var minutes = nd.getMinutes();
        document.write((hours < 10 ? '0' : '') + hours + ":" + (minutes < 10 ? '0' : '') + minutes);
            </script>
        </div>
    </div>

</body>
</html>
