<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
}
</style>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Kindle Dashboard</title>

<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    color:#000000;
    font-family:Georgia, serif;
    text-align:center;
}

.container{
    width:100%;
    margin-top:40px;
}

.day{
    font-size:130px;
    font-weight:bold;
    line-height:1;
}

.month{
    font-size:28px;
    letter-spacing:8px;
    margin-bottom:40px;
}

.weather{
    font-size:28px;
    line-height:1.6;
}

.separator{
    width:70%;
    margin:35px auto;
    border-top:1px solid #000;
}

.quote{
    width:80%;
    margin:auto;
    font-size:24px;
    line-height:1.7;
}

.time{
    font-size:42px;
    margin-top:10px;
}

</style>
<meta http-equiv="refresh" content="3600">

</head>

<body>

<div class="container">

<div class="day">
<script>
var now = new Date();
var brasil = new Date(now.getTime() - (3 * 60 * 60 * 1000));
document.write(brasil.getUTCDate());
</script>
</div>

<div class="month">
<script>
var meses = [
"JANUARY","FEBRUARY","MARCH",
"APRIL","MAY","JUNE",
"JULY","AUGUST","SEPTEMBER",
"OCTOBER","NOVEMBER","DECEMBER"
];

document.write(meses[brasil.getUTCMonth()]); </script>

</div>

<div class="weather">
☁ Nublado<br>
18°C
</div>

<div class="separator"></div>

<div class="quote">
<script>

var h = brasil.getUTCHours();

var frasesManha = [
"Não espere motivação. Comece.",
"O dia pertence a quem age primeiro.",
"Ação gera motivação.",
"Disciplina é fazer o que precisa ser feito.",
"O futuro é construído antes que os outros acordem."
];

var frasesTarde = [
"Concentre-se na próxima ação.",
"Continue enquanto os outros desaceleram.",
"O progresso raramente é dramático.",
"Persistência vence talento sem disciplina.",
"A vitória é a soma dos dias comuns."
];

var frasesNoite = [
"Você controlou suas ações hoje?",
"A paz vem de aceitar o que não controla.",
"A gratidão multiplica o que já existe.",
"Seja paciente com o processo.",
"A excelência nasce da repetição."
];

var lista;

if(h >= 5 && h < 12){
lista = frasesManha;
}else if(h >= 12 && h < 18){
lista = frasesTarde;
}else{
lista = frasesNoite;
}

document.write(lista[h % lista.length]);

</script>
</div>

<div class="separator"></div>

<div class="time">
<script>

var m = brasil.getUTCMinutes();

document.write(
(h < 10 ? "0" : "") + h +
":" +
(m < 10 ? "0" : "") + m
);

</script>
</div>

</div>


<div class="separator"></div>

<div class="time">
<script>

var now = new Date();

var brasil = new Date(
    now.getTime() - (3 * 60 * 60 * 1000)
);

var h = brasil.getUTCHours();
var m = brasil.getUTCMinutes();

document.write(
    (h < 10 ? "0" : "") + h +
    ":" +
    (m < 10 ? "0" : "") + m
);

</script>
</div>

</div>

</body>
